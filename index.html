<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24HR MKT NEWS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement(
    { pageLanguage: 'zh-TW', includedLanguages: 'zh-TW,zh-CN,en', autoDisplay: false },
    'google_translate_element'
  );
  initLanguageSelect();
}

function setTranslateCookie(lang) {
  const value = `/zh-TW/${lang}`;
  document.cookie = `googtrans=${value};path=/`;
  document.cookie = `googtrans=${value};path=/;domain=${location.hostname}`;
  const rootDomain = location.hostname.split('.').slice(-2).join('.');
  if (rootDomain && rootDomain !== location.hostname) {
    document.cookie = `googtrans=${value};path=/;domain=.${rootDomain}`;
  }
}

function clearTranslateCookie() {
  const expired = 'googtrans=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
  document.cookie = expired;
  document.cookie = `${expired};domain=${location.hostname}`;
  const rootDomain = location.hostname.split('.').slice(-2).join('.');
  if (rootDomain && rootDomain !== location.hostname) {
    document.cookie = `${expired};domain=.${rootDomain}`;
  }
}

function changeGoogleLanguage(lang) {
  const combo = document.querySelector('.goog-te-combo');
  if (!combo) return false;
  combo.value = lang;
  combo.dispatchEvent(new Event('change'));
  return true;
}

const teTranslationCache = new Map();
let teTranslationRun = 0;

function attrEscape(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

async function googleTranslateText(text, targetLang) {
  const key = `${targetLang}:${text}`;
  if (teTranslationCache.has(key)) return teTranslationCache.get(key);
  const params = new URLSearchParams({
    client: 'gtx',
    sl: 'auto',
    tl: targetLang,
    dt: 't',
    q: text,
  });
  const res = await fetch(`https://translate.googleapis.com/translate_a/single?${params}`);
  if (!res.ok) throw new Error(`translate ${res.status}`);
  const data = await res.json();
  const translated = (data?.[0] || []).map(part => part?.[0] || '').join('').trim();
  if (translated) teTranslationCache.set(key, translated);
  return translated || text;
}

async function translateTradingEconomicsCards(targetLang) {
  const run = ++teTranslationRun;
  const cards = [...document.querySelectorAll('.card-body[data-te-original]')].slice(0, 120);
  for (const card of cards) {
    const original = card.dataset.teOriginal || '';
    if (!original) continue;
    if (targetLang === 'en') {
      card.textContent = original;
      continue;
    }
    card.classList.add('is-translating');
    try {
      const translated = await googleTranslateText(original, targetLang);
      if (run !== teTranslationRun) return;
      card.textContent = translated;
    } catch (e) {
      console.warn('Trading Economics translate error:', e.message);
      card.textContent = original;
    } finally {
      card.classList.remove('is-translating');
    }
  }
}

function refreshGoogleTranslation() {
  const lang = localStorage.getItem('mktNewsLang') || 'zh-TW';
  translateTradingEconomicsCards(lang);
  if (lang === 'zh-TW') return;
  setTranslateCookie(lang);
  [0, 250, 800].forEach(delay => {
    setTimeout(() => changeGoogleLanguage(lang), delay);
  });
}

function initLanguageSelect() {
  const select = document.getElementById('languageSelect');
  if (!select) {
    document.addEventListener('DOMContentLoaded', initLanguageSelect, { once: true });
    return;
  }
  const saved = localStorage.getItem('mktNewsLang') || 'zh-TW';
  select.value = saved;
  if (saved !== 'zh-TW') {
    setTranslateCookie(saved);
    setTimeout(() => changeGoogleLanguage(saved), 300);
  }
  select.addEventListener('change', () => {
    const lang = select.value;
    localStorage.setItem('mktNewsLang', lang);
    if (lang === 'zh-TW') {
      clearTranslateCookie();
      location.reload();
      return;
    }
    setTranslateCookie(lang);
    translateTradingEconomicsCards(lang);
    if (!changeGoogleLanguage(lang)) location.reload();
  });
}
</script>

  @media (max-width: 1100px) { .live-col { display: none; } }

</style>

<script>
/* ════════════════════════════════
   NEWS FEED
════════════════════════════════ */
const DATA_URL   = './data.json';
const MARKET_URL = './market.json';
const AI_SUMMARY_URL = './ai_summaries.json';
const CENTRAL_BANK_SUMMARY_URL = './central_bank_summaries.json';
const MAX_RENDER_ITEMS = 500;
const TAG_ORDER = [
  '全部',
  '焦點',
  '重要',
  '熱門',
  '國際',
  '中國',
  '美國',
  '歐洲',
  '日本亞太',
  '新興市場',
  '市場',
  '央行',
  '宏觀',
  '經濟數據',
  '公司',
  '科技',
  '商品',
  '加密',
  '觀點',
  'Trading Economics',
  'MKT News',
  '原創',
  '其他',
];
const FILTER_TAGS = TAG_ORDER.filter(tag => tag !== '全部');
const TAG_ALIASES = {
  '国际': '國際',
  'Important': '重要',
  'Importance 1': '重要',
  'Importance 2': '重要',
  'Importance 3': '重要',
  'Hot': '熱門',
  'Breaking News 24h': '焦點',
  'Policy': '國際',
  'Market Regions': '國際',
  'Greater China': '中國',
  'Chinese Policy & Markets': '中國',
  'China EV Leaders': ['中國', '科技'],
  'China Tech Giants': ['中國', '科技'],
  'Wall Street (US)': '美國',
  'US Economy': ['美國', '經濟數據'],
  'Europe & UK': '歐洲',
  'Japan & APAC': '日本亞太',
  'Emerging Markets': '新興市場',
  'Markets': '市場',
  'Market Themes': '市場',
  'Impact bullish': '市場',
  'Impact bearish': '市場',
  'Impact mixed': '市場',
  'The Trump Trade': '市場',
  '央行': '央行',
  'The Fed (FOMC)': '央行',
  'Macro & Rates': '宏觀',
  'Treasury Yields': '宏觀',
  'Economy': '宏觀',
  '資料': '經濟數據',
  'Economic Calendar': '經濟數據',
  'Star Stocks': '公司',
  'Magnificent 7': ['公司', '科技'],
  'AI Revolution': '科技',
  'Chip Wars': '科技',
  'Commodities': '商品',
  'Commodity': '商品',
  'Energy': '商品',
  'Precious Metals': '商品',
  'Industrial Metals': '商品',
  'Crypto Concepts': '加密',
};
let allItems = [], activeCats = new Set(), activeHrs = 24, searchQ = '';

function parseTime(str) {
  if (!str) return 0;
  return new Date(str.replace(' ','T') + '+08:00').getTime();
}
function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(esc,'gi'), m =>
    `<mark style="background:rgba(201,168,76,.28);color:#e2c87a;border-radius:2px;padding:0 2px">${m}</mark>`);
}

function getDisplayTags(item) {
  const rawTags = item.tags || [];
  const normalized = new Set();
  rawTags.forEach(rawTag => {
    const mapped = TAG_ALIASES[rawTag] || rawTag;
    const mappedTags = Array.isArray(mapped) ? mapped : [mapped];
    mappedTags.forEach(tag => {
      if (FILTER_TAGS.includes(tag)) normalized.add(tag);
    });
  });
  const tags = FILTER_TAGS.filter(tag => normalized.has(tag));
  return tags.length ? tags : ['其他'];
}

function itemHasAnyActiveTag(item) {
  if (!activeCats.size) return true;
  const tags = getDisplayTags(item);
  return [...activeCats].some(tag => tags.includes(tag));
}

function updateCatButtons() {
  document.querySelectorAll('.cat-btn').forEach(btn => {
    const cat = btn.dataset.cat || '';
    const isActive = cat ? activeCats.has(cat) : activeCats.size === 0;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', String(isActive));
  });
}

async function loadNews() {
  try {
    const data = await (await fetch(DATA_URL + '?t=' + Date.now())).json();
    allItems = data.items || [];
    document.getElementById('updatedAt').innerHTML =
      `<span class="pulse"></span>更新於 ${data.updated || '—'}`;
    buildCats(); render(); refreshGoogleTranslation();
  } catch(e) {
    document.getElementById('digestList').innerHTML =
      `<div class="empty">無法載入資料<br>${e.message}</div>`;
  }
}

function buildCats() {
  const wrap = document.getElementById('filterWrap');
  wrap.querySelectorAll('.cat-btn:not([data-cat=""])').forEach(b => b.remove());
  const pills = wrap.querySelector('.time-pills');
  FILTER_TAGS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCats.has(name) ? ' active' : '');
    btn.dataset.cat = name; btn.textContent = name;
    btn.setAttribute('aria-pressed', String(activeCats.has(name)));
    wrap.insertBefore(btn, pills);
  });
  updateCatButtons();
}

function render() {
  const now = Date.now();
  const cutoff = activeHrs > 0 ? now - activeHrs*3600000 : 0;
  const filtered = allItems.filter(item => {
    if (cutoff && parseTime(item.time) < cutoff) return false;
    if (!itemHasAnyActiveTag(item)) return false;
    if (searchQ && !item.text.includes(searchQ) && !getDisplayTags(item).some(t=>t.includes(searchQ))) return false;
    return true;
  });
  const visible = filtered.slice(0, MAX_RENDER_ITEMS);
  document.getElementById('resultsCount').textContent =
    filtered.length > visible.length
      ? `顯示最新 ${visible.length} / ${filtered.length} 筆`
      : (filtered.length < allItems.length ? `顯示 ${filtered.length} 筆` : '');
  const list = document.getElementById('digestList');
  if (!filtered.length) {
    list.innerHTML='<div class="empty">無符合條件的快訊</div>';
    refreshGoogleTranslation();
    return;
  }
  list.innerHTML = visible.map((item,i) => {
    const [dp,tp] = (item.time||'').split(' ');
    const hm = (tp||'').slice(0,5);
    const tags = getDisplayTags(item).map(t=>`<span class="tag">${t}</span>`).join('');
    const isTE = (item.tags || []).includes('Trading Economics');
    const teAttrs = isTE ? ` data-te-original="${attrEscape(item.text)}"` : '';
    return `<div class="card" style="animation-delay:${Math.min(i,20)*.03}s">
      <div class="card-time"><span class="t-date">${dp||'—'}</span><span class="t-time">${hm}</span></div>
      <div>${tags?`<div class="card-tags">${tags}</div>`:''}
        <div class="card-body"${teAttrs}>${highlight(item.text,searchQ)}</div></div>
    </div>`;
  }).join('');
  refreshGoogleTranslation();
}

document.getElementById('filterWrap').addEventListener('click', e => {
  const cb = e.target.closest('.cat-btn');
  if (cb) {
    const cat = cb.dataset.cat || '';
    if (!cat) {
      activeCats.clear();
    } else if (activeCats.has(cat)) {
      activeCats.delete(cat);
    } else {
      activeCats.add(cat);
    }
    updateCatButtons();
    render();
    return;
  }
  const tp = e.target.closest('.time-pill');
  if (tp) {
    document.querySelectorAll('.time-pill').forEach(b=>b.classList.remove('active'));
    tp.classList.add('active'); activeHrs = parseInt(tp.dataset.h); render();
  }
});
document.getElementById('search').addEventListener('input', e => { searchQ=e.target.value.trim(); render(); });
loadNews();
setInterval(loadNews, 60000);

/* ── 中欄頁籤切換 ── */
document.querySelectorAll('.c-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.c-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.center-view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
  });
});

/* ════════════════════════════════
   CHARTS
════════════════════════════════ */
const LW_BASE = {
  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#5a5a72', fontSize: 10 },
  grid: { vertLines: { color: '#1c1c2e' }, horzLines: { color: '#1c1c2e' } },
  timeScale: { borderColor: '#2a2a40', timeVisible: true, secondsVisible: false, fixRightEdge: true },
  rightPriceScale: { borderColor: '#2a2a40' },
  crosshair: { mode: 1 },
};

let marketCache = null;
const createdCharts = {};

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return n >= 1000 ? n.toLocaleString('en-US', { maximumFractionDigits: 2 }) :
         n >= 10   ? n.toFixed(2) : n.toFixed(4);
}

function changePct(price, prev) {
  if (!price || !prev) return { str: '—', cls: '' };
  const p = ((price - prev) / prev) * 100;
  return { str: (p >= 0 ? '+' : '') + p.toFixed(2) + '%', cls: p >= 0 ? 'up' : 'dn' };
}

function buildChart(container, bars, type = 'candle') {
  container.innerHTML = '';
  const chart = LightweightCharts.createChart(container, {
    ...LW_BASE,
    width: container.clientWidth,
    height: container.clientHeight,
  });

  if (type === 'candle') {
    const s = chart.addCandlestickSeries({
      upColor: '#4cc97a', downColor: '#e05555',
      borderUpColor: '#4cc97a', borderDownColor: '#e05555',
      wickUpColor: '#4cc97a', wickDownColor: '#e05555',
    });
    s.setData(bars.map(b => ({ time: b.t, open: b.o, high: b.h, low: b.l, close: b.c })));
  } else {
    const isUp = bars.length < 2 || bars[bars.length-1].c >= bars[0].c;
    const s = chart.addAreaSeries({
      lineColor: isUp ? '#4cc97a' : '#e05555',
      topColor: isUp ? 'rgba(76,201,122,.18)' : 'rgba(224,85,85,.18)',
      bottomColor: 'transparent',
      lineWidth: 1, priceLineVisible: false, lastValueVisible: false,
    });
    s.setData(bars.map(b => ({ time: b.t, value: b.c })));
  }

  chart.timeScale().fitContent();
  new ResizeObserver(() => chart.applyOptions({
    width: container.clientWidth, height: container.clientHeight
  })).observe(container);
  return chart;
}

function renderPanel(panelId, marketData) {
  const cfg = marketData.panels[panelId];
  if (!cfg) return;
  const symData = marketData.data;

  const mainSym = cfg.main.symbol;
  const mainEl  = document.getElementById(`mc-${panelId}`);
  const labelEl = document.getElementById(`ml-${panelId}`);
  const sd = symData[mainSym];

  if (sd && sd.bars?.length && mainEl) {
    const chg = changePct(sd.price, sd.prev_close);
    if (labelEl) labelEl.innerHTML =
      `${cfg.main.name} &nbsp;<span style="color:var(--text)">${fmt(sd.price)}</span>&nbsp;<span class="${chg.cls}">${chg.str}</span>`;
    if (createdCharts[`main-${panelId}`]) {
      try { createdCharts[`main-${panelId}`].remove(); } catch(e) {}
    }
    createdCharts[`main-${panelId}`] = buildChart(mainEl, sd.bars, 'candle');
  } else if (mainEl) {
    mainEl.innerHTML = '<div class="chart-loading">無資料</div>';
  }

  const gridEl = document.getElementById(`mg-${panelId}`);
  if (!gridEl) return;
  gridEl.innerHTML = '';

  cfg.minis.forEach((mini) => {
    const card = document.createElement('div');
    card.className = 'mini-item';

    const md = symData[mini.symbol];
    if (!md) {
      card.innerHTML = `<div class="mini-info"><span class="mini-name">${mini.name}</span></div><div class="mini-price">無資料</div>`;
      gridEl.appendChild(card);
      return;
    }

    const chg = changePct(md.price, md.prev_close);
    card.innerHTML = `
      <div class="mini-info">
        <span class="mini-name">${mini.name}</span>
        <span class="mini-chg ${chg.cls}">${chg.str}</span>
      </div>
      <div class="mini-price">${fmt(md.price)}</div>
      <div class="mini-chart-area" style="flex:1;min-height:0"></div>`;
    gridEl.appendChild(card);

    if (md.bars?.length) {
      const areaEl = card.querySelector('.mini-chart-area');
      requestAnimationFrame(() => {
        const mc = LightweightCharts.createChart(areaEl, {
          ...LW_BASE,
          width: areaEl.clientWidth, height: areaEl.clientHeight,
          timeScale: { visible: false },
          rightPriceScale: { visible: false },
          leftPriceScale:  { visible: false },
          grid: { vertLines: { visible: false }, horzLines: { visible: false } },
          crosshair: { mode: 0 },
          handleScroll: false, handleScale: false,
        });
        const isUp = chg.cls === 'up';
        const as = mc.addAreaSeries({
          lineColor: isUp ? '#4cc97a' : '#e05555',
          topColor:  isUp ? 'rgba(76,201,122,.15)' : 'rgba(224,85,85,.15)',
          bottomColor: 'transparent',
          lineWidth: 1, priceLineVisible: false, lastValueVisible: false,
        });
        as.setData(md.bars.map(b => ({ time: b.t, value: b.c })));
        mc.timeScale().fitContent();
        new ResizeObserver(() => mc.applyOptions({
          width: areaEl.clientWidth, height: areaEl.clientHeight
        })).observe(areaEl);
      });
    }
  });
}

async function loadMarket() {
  try {
    const data = await (await fetch(MARKET_URL + '?t=' + Date.now())).json();
    marketCache = data;
    document.getElementById('marketUpdated').textContent = `報價更新：${data.updated || '—'}（每 5 分鐘）`;
    buildTicker(data);
    const activePanel = document.querySelector('.m-tab.active')?.dataset.panel || 'equity';
    renderPanel(activePanel, data);
  } catch(e) {
    document.getElementById('marketUpdated').textContent = '報價載入失敗';
    console.warn('market.json load error:', e.message);
  }
}

function buildTicker(data) {
  const TICKER_SYMBOLS = [
    { symbol: "ES=F",      label: "S&P Fut" },
    { symbol: "NQ=F",      label: "NQ Fut" },
    { symbol: "YM=F",      label: "Dow Fut" },
    { symbol: "FDAX=F",    label: "DAX Fut" },
    { symbol: "^VIX",      label: "VIX" },
    { symbol: "CL=F",      label: "WTI" },
    { symbol: "BZ=F",      label: "Brent" },
    { symbol: "GC=F",      label: "Gold" },
    { symbol: "SI=F",      label: "Silver" },
    { symbol: "HG=F",      label: "Copper" },
    { symbol: "NG=F",      label: "Nat Gas" },
    { symbol: "DX-Y.NYB",  label: "DXY" },
    { symbol: "EURUSD=X",  label: "EUR/USD" },
    { symbol: "JPY=X",     label: "USD/JPY" },
    { symbol: "GBPUSD=X",  label: "GBP/USD" },
    { symbol: "USDCNH=X",  label: "USD/CNH" },
    { symbol: "^TNX",      label: "US 10Y" },
    { symbol: "^TYX",      label: "US 30Y" },
    { symbol: "DE10YT=RR", label: "DE 10Y" },
  ];
  const html = TICKER_SYMBOLS.map(t => {
    const d = data.data?.[t.symbol];
    if (!d) return "";
    const price = d.price; const prev = d.prev_close;
    const chg = (!price || !prev) ? { str: "—", cls: "" } : (() => {
      const p = ((price - prev) / prev) * 100;
      return { str: (p >= 0 ? "▲" : "▼") + Math.abs(p).toFixed(2) + "%", cls: p >= 0 ? "up" : "dn" };
    })();
    const priceStr = price >= 1000 ? price.toLocaleString("en-US", {maximumFractionDigits: 2}) : price >= 10 ? price.toFixed(2) : price.toFixed(4);
    return `<span class="t-item"><span class="t-name">${t.label}</span><span class="t-price">${priceStr}</span><span class="t-chg ${chg.cls}">${chg.str}</span></span>`;
  }).join("");
  document.getElementById("ticker-inner").innerHTML = html;
  document.getElementById("ticker-clone").innerHTML = html;
}

document.querySelectorAll('.m-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.m-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const panelId = tab.dataset.panel;
    document.getElementById('panel-' + panelId).classList.add('active');
    if (marketCache) renderPanel(panelId, marketCache);
  });
});

/* ════════════════════════════════
   AI 摘要
════════════════════════════════ */
let aiSummaries = [], activeAiId = '', activeAiMonth = '', activeAiDate = '';

function aiDateKey(item) {
  return (item.slot_start || item.slot_end || '').slice(0, 10);
}

function aiMonthKey(item) {
  return aiDateKey(item).slice(0, 7);
}

function formatAiSlot(item) {
  const end = item.slot_end || '';
  if (!end) return '—';
  const date = end.slice(5, 10);
  const hour = parseInt(end.slice(11, 13), 10);
  const h = hour % 12 || 12;
  const ampm = hour < 12 ? 'am' : 'pm';
  return `${date} ${h}${ampm}`;
}

function formatAiSlotRange(item) {
  const start = item.slot_start || '';
  const end = item.slot_end || '';
  if (!start || !end) return formatAiSlot(item);
  return `${start.slice(11, 13)}-${end.slice(11, 13)}`;
}

function formatRecentAiSlot(item) {
  const start = item.slot_start || '';
  if (!start) return formatAiSlot(item);
  return `${start.slice(5, 10).replace('-', '.')} ${formatAiSlotRange(item)}`;
}

function formatAiDateOption(dateKey) {
  return dateKey ? dateKey.replaceAll('-', '.') : '—';
}

function scoreNum(value) {
  const n = Number(value);
  return Number.isFinite(n) ? Math.max(0, Math.min(10, n)) : null;
}

function scoreClass(value) {
  if (value === null) return '';
  if (value >= 7) return 'hot';
  if (value <= 3) return 'cold';
  return '';
}

function renderScoreChips(item) {
  const risk = scoreNum(item.risk_on_score);
  const surprise = scoreNum(item.fundamental_surprise_score);
  if (risk === null && surprise === null) return '';
  return `
    <div class="ai-score-row">
      ${risk !== null ? `<div class="ai-score-chip">RISK ON <span>${risk.toFixed(1)}</span>/10</div>` : ''}
      ${surprise !== null ? `<div class="ai-score-chip">SURPRISE <span>${surprise.toFixed(1)}</span>/10</div>` : ''}
    </div>
  `;
}

function radarPoint(cx, cy, radius, angle, score) {
  const r = radius * (score / 10);
  return [
    cx + Math.cos(angle) * r,
    cy + Math.sin(angle) * r,
  ];
}

function renderScoreRadar(latest, avgRisk, avgSurprise) {
  const risk = scoreNum(latest.risk_on_score) ?? 5;
  const surprise = scoreNum(latest.fundamental_surprise_score) ?? 5;
  const axes = [
    { label: 'Risk On', angle: -Math.PI / 2, score: risk, avg: avgRisk },
    { label: 'Surprise', angle: 0, score: surprise, avg: avgSurprise },
    { label: 'Risk Off', angle: Math.PI / 2, score: 10 - risk, avg: 10 - avgRisk },
    { label: 'Miss', angle: Math.PI, score: 10 - surprise, avg: 10 - avgSurprise },
  ];
  const cx = 150, cy = 92, radius = 56;
  const rings = [2.5, 5, 7.5, 10].map(v => {
    const pts = axes.map(a => radarPoint(cx, cy, radius, a.angle, v).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="rgba(42,42,64,.85)" stroke-width="1"/>`;
  }).join('');
  const axisLines = axes.map(a => {
    const p = radarPoint(cx, cy, radius, a.angle, 10);
    const label = radarPoint(cx, cy, radius + 22, a.angle, 10);
    return `<line x1="${cx}" y1="${cy}" x2="${p[0]}" y2="${p[1]}" stroke="rgba(42,42,64,.85)" stroke-width="1"/>
      <text x="${label[0]}" y="${label[1] + 4}" text-anchor="middle" fill="#8f8b82" font-size="9" font-family="DM Mono">${a.label}</text>`;
  }).join('');
  const avgPts = axes.map(a => radarPoint(cx, cy, radius, a.angle, a.avg).join(',')).join(' ');
  const pts = axes.map(a => radarPoint(cx, cy, radius, a.angle, a.score).join(',')).join(' ');
  return `<svg class="score-svg" viewBox="0 0 300 190" role="img" aria-label="AI score radar">
    ${rings}${axisLines}
    <polygon points="${avgPts}" fill="rgba(143,139,130,.12)" stroke="rgba(143,139,130,.75)" stroke-width="1.2"/>
    <polygon points="${pts}" fill="rgba(201,168,76,.22)" stroke="#c9a84c" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="2.5" fill="#c9a84c"/>
    <text x="12" y="176" fill="#8f8b82" font-size="9" font-family="DM Mono">gold: latest · gray: 8-slot avg</text>
  </svg>`;
}

function renderScoreLine(points) {
  const w = 300, h = 150, pad = 24;
  const innerW = w - pad * 2;
  const innerH = h - pad * 2;
  const x = idx => pad + (points.length <= 1 ? innerW : (innerW * idx) / (points.length - 1));
  const y = value => pad + innerH - (value / 10) * innerH;
  const linePath = key => points.map((p, idx) => `${idx ? 'L' : 'M'}${x(idx).toFixed(1)},${y(p[key]).toFixed(1)}`).join(' ');
  const dots = (key, color) => points.map((p, idx) => `<circle cx="${x(idx)}" cy="${y(p[key])}" r="2.4" fill="${color}"/>`).join('');
  const labels = points.map((p, idx) => {
    if (idx % 4 && idx !== points.length - 1) return '';
    return `<text x="${x(idx)}" y="140" text-anchor="middle" fill="#77736b" font-size="8" font-family="DM Mono">${attrEscape(p.label)}</text>`;
  }).join('');
  return `<svg class="score-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="AI score time series">
    <line x1="${pad}" y1="${y(10)}" x2="${w - pad}" y2="${y(10)}" stroke="rgba(42,42,64,.55)"/>
    <line x1="${pad}" y1="${y(5)}" x2="${w - pad}" y2="${y(5)}" stroke="rgba(42,42,64,.85)"/>
    <line x1="${pad}" y1="${y(0)}" x2="${w - pad}" y2="${y(0)}" stroke="rgba(42,42,64,.55)"/>
    <text x="7" y="${y(10) + 3}" fill="#77736b" font-size="8" font-family="DM Mono">10</text>
    <text x="12" y="${y(5) + 3}" fill="#77736b" font-size="8" font-family="DM Mono">5</text>
    <text x="12" y="${y(0) + 3}" fill="#77736b" font-size="8" font-family="DM Mono">0</text>
    <path d="${linePath('risk')}" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="${linePath('surprise')}" fill="none" stroke="#c9a84c" stroke-width="2"/>
    ${dots('risk', '#22c55e')}${dots('surprise', '#c9a84c')}${labels}
    <text x="24" y="15" fill="#22c55e" font-size="9" font-family="DM Mono">Risk On</text>
    <text x="92" y="15" fill="#c9a84c" font-size="9" font-family="DM Mono">Surprise</text>
  </svg>`;
}

function renderAiScores() {
  const root = document.getElementById('aiScoreContent');
  if (!root) return;
  const points = aiSummaries
    .filter(item => scoreNum(item.risk_on_score) !== null && scoreNum(item.fundamental_surprise_score) !== null)
    .slice(0, 24)
    .reverse()
    .map(item => ({
      label: formatAiSlot(item).replace(' ', '\n'),
      risk: scoreNum(item.risk_on_score),
      surprise: scoreNum(item.fundamental_surprise_score),
      item,
    }));
  if (!points.length) {
    root.innerHTML = '<div class="ai-empty">尚無 AI 分數資料。</div>';
    return;
  }
  const latest = points[points.length - 1].item;
  const risk = scoreNum(latest.risk_on_score);
  const surprise = scoreNum(latest.fundamental_surprise_score);
  const avgRisk = points.reduce((sum, p) => sum + p.risk, 0) / points.length;
  const avgSurprise = points.reduce((sum, p) => sum + p.surprise, 0) / points.length;
  root.innerHTML = `
    <div class="score-kpis">
      <div class="score-kpi">
        <div class="score-kpi-label">Risk On / Off</div>
        <div class="score-kpi-value ${scoreClass(risk)}">${risk.toFixed(1)}</div>
      </div>
      <div class="score-kpi">
        <div class="score-kpi-label">Fundamental Surprise</div>
        <div class="score-kpi-value ${scoreClass(surprise)}">${surprise.toFixed(1)}</div>
      </div>
    </div>
    ${latest.score_commentary ? `<div class="score-commentary">${attrEscape(latest.score_commentary)}</div>` : ''}
    <div class="score-chart-label">Radar</div>
    <div class="score-svg-wrap">${renderScoreRadar(latest, avgRisk, avgSurprise)}</div>
    <div class="score-chart-label">3H Time Series</div>
    <div class="score-svg-wrap">${renderScoreLine(points)}</div>
  `;
}

function renderAiSummaryDetail(item) {
  const detail = document.getElementById('aiSummaryDetail');
  if (!detail) return;
  if (!item) {
    detail.innerHTML = '<div class="ai-empty">尚無可顯示的 AI 摘要。</div>';
    return;
  }
  const events = (item.events || []).map((event, idx) => `
    <div class="ai-event">
      <div class="ai-event-num">${String(idx + 1).padStart(2, '0')}</div>
      <div>
        <div class="ai-event-title">${attrEscape(event.title || '未命名事件')}</div>
        <div class="ai-event-text">${attrEscape(event.explanation || '')}</div>
        ${event.impact ? `<div class="ai-event-impact">IMPACT ${attrEscape(event.impact)}</div>` : ''}
      </div>
    </div>
  `).join('');
  const eventCount = (item.events || []).length;
  detail.innerHTML = `
    <div class="ai-detail-head">
      <div class="ai-detail-title">${attrEscape(item.summary_title || 'AI 摘要分析')}</div>
      <div class="ai-detail-summary">${attrEscape(item.summary || '')}</div>
      ${renderScoreChips(item)}
    </div>
    <div class="ai-events-header">
      詳細事件
      <span class="ai-events-header-count">${eventCount} 則</span>
    </div>
    <div class="ai-events-list">
      ${events || '<div class="ai-empty">這則摘要沒有事件明細。</div>'}
    </div>
  `;
}

function renderAiSummaries() {
  const list = document.getElementById('aiSummaryList');
  const monthSelect = document.getElementById('aiMonthSelect');
  const dateSelect = document.getElementById('aiDateSelect');
  const periodCount = document.getElementById('aiPeriodCount');
  const updated = document.getElementById('aiUpdated');
  if (!list || !monthSelect || !dateSelect || !periodCount || !updated) return;
  updated.textContent = aiSummaries.length ? `更新 ${aiSummaries[0].generated_at || '—'}` : '尚無摘要';
  if (!aiSummaries.length) {
    list.innerHTML = '';
    monthSelect.innerHTML = '';
    dateSelect.innerHTML = '';
    periodCount.textContent = '';
    renderAiSummaryDetail(null);
    renderAiScores();
    return;
  }
  const months = [...new Set(aiSummaries.map(aiMonthKey).filter(Boolean))].sort().reverse();
  if (!activeAiMonth || !months.includes(activeAiMonth)) {
    activeAiMonth = months[0] || '';
  }
  monthSelect.innerHTML = months.map(month => `<option value="${attrEscape(month)}" ${month === activeAiMonth ? 'selected' : ''}>${attrEscape(month)}</option>`).join('');

  const monthSummaries = aiSummaries.filter(item => aiMonthKey(item) === activeAiMonth);
  const dates = [...new Set(monthSummaries.map(aiDateKey).filter(Boolean))].sort().reverse();
  if (!activeAiDate || !dates.includes(activeAiDate)) {
    activeAiDate = dates[0] || '';
  }
  dateSelect.innerHTML = dates.map(date => `<option value="${attrEscape(date)}" ${date === activeAiDate ? 'selected' : ''}>${attrEscape(formatAiDateOption(date))}</option>`).join('');

  const daySummaries = monthSummaries.filter(item => aiDateKey(item) === activeAiDate);
  const visibleSummaries = daySummaries.slice(0, 10);
  periodCount.textContent = `${visibleSummaries.length}/${daySummaries.length} slots`;

  if (!activeAiId || !aiSummaries.some(item => item.id === activeAiId)) {
    activeAiId = (visibleSummaries[0] || aiSummaries[0]).id;
  }
  if (!visibleSummaries.some(item => item.id === activeAiId)) {
    activeAiId = (visibleSummaries[0] || aiSummaries[0]).id;
  }

  list.innerHTML = visibleSummaries.map(item => {
    const isActive = item.id === activeAiId;
    return `<button class="ai-pill ${isActive ? 'active' : ''}" data-ai-id="${attrEscape(item.id)}" title="${attrEscape(item.slot_start || '')} → ${attrEscape(item.slot_end || '')}">
      ${formatRecentAiSlot(item)}
    </button>`;
  }).join('');
  renderAiSummaryDetail(aiSummaries.find(item => item.id === activeAiId));
  renderAiScores();
}

async function loadAiSummaries() {
  try {
    const data = await (await fetch(AI_SUMMARY_URL + '?t=' + Date.now())).json();
    aiSummaries = data.items || [];
    renderAiSummaries();
  } catch (e) {
    document.getElementById('aiUpdated').textContent = '載入失敗';
    document.getElementById('aiSummaryDetail').innerHTML =
      `<div class="ai-empty">無法載入 AI 摘要<br>${attrEscape(e.message)}</div>`;
  }
}

function renderBulletSection(title, items) {
  const bullets = (items || []).filter(Boolean);
  const rows = bullets.length
    ? bullets.map(text => `<li>${attrEscape(text)}</li>`).join('')
    : '<li>今日無明確資料。</li>';
  return `
    <div class="cb-section">
      <div class="cb-section-title">${attrEscape(title)}</div>
      <ol class="cb-list">${rows}</ol>
    </div>
  `;
}

function renderPolicySection(title, items) {
  const bullets = (items || []).filter(Boolean);
  if (!bullets.length) return '';
  const rows = bullets.map(text => `<li>${attrEscape(text)}</li>`).join('');
  return `
    <div class="cb-policy-section">
      <div class="cb-policy-section-title">${attrEscape(title)}</div>
      <ol class="cb-policy-list">${rows}</ol>
    </div>
  `;
}

function renderPolicyRelease(release) {
  if (!release || !release.has_release) return '';
  const summary = (release.summary || '').trim();
  const summaryBlock = summary
    ? `<div class="cb-policy-summary">${attrEscape(summary)}</div>`
    : '';
  const sections = [
    renderPolicySection('利率決議與政策工具', release.decision),
    renderPolicySection('政策聲明關鍵內容', release.statement),
    renderPolicySection('經濟與通膨評估', release.economic_view),
    renderPolicySection('前瞻指引', release.forward_guidance),
    renderPolicySection('記者會 / 行長談話重點', release.press_conference),
    renderPolicySection('市場反應與後續定價', release.market_reaction),
  ].join('');
  if (!summaryBlock && !sections) return '';
  return `
    <div class="cb-policy">
      <span class="cb-policy-tag">Policy Decision · 深度分析</span>
      ${summaryBlock}
      ${sections}
    </div>
  `;
}

function renderCentralBankSummary(item) {
  const root = document.getElementById('centralBankList');
  const headline = document.getElementById('cbHeadline');
  const updated = document.getElementById('cbUpdated');
  if (!root || !headline || !updated) return;
  if (!item) {
    headline.textContent = '尚無央行摘要';
    updated.textContent = '每日更新';
    root.innerHTML = '<div class="ai-empty">尚無可顯示的央行摘要。</div>';
    return;
  }
  headline.textContent = item.headline || '央行摘要';
  updated.textContent = `${item.date || '—'}｜${item.generated_at || '—'}`;
  root.innerHTML = (item.central_banks || []).map(bank => {
    const release = bank.policy_release;
    const hasRelease = !!(release && release.has_release);
    const body = hasRelease
      ? renderPolicyRelease(release)
      : [
          renderBulletSection('1. 當天該央行官員發言整理', bank.officials),
          renderBulletSection('2. 市場對於央行的政策預期', bank.expectations),
          renderBulletSection('3. 當天央行重要報告發布', bank.reports),
        ].join('');
    return `
      <article class="cb-card">
        <div class="cb-card-head">
          <div class="cb-name">${attrEscape(bank.name || '')}</div>
          <div class="cb-status">${attrEscape(bank.status || '追蹤中')}</div>
        </div>
        ${body}
      </article>
    `;
  }).join('');
}

async function loadCentralBankSummaries() {
  try {
    const data = await (await fetch(CENTRAL_BANK_SUMMARY_URL + '?t=' + Date.now())).json();
    renderCentralBankSummary((data.items || [])[0]);
  } catch (e) {
    document.getElementById('cbHeadline').textContent = '載入失敗';
    document.getElementById('centralBankList').innerHTML =
      `<div class="ai-empty">無法載入央行摘要<br>${attrEscape(e.message)}</div>`;
  }
}

document.getElementById('aiSummaryList').addEventListener('click', e => {
  const item = e.target.closest('.ai-pill');
  if (!item) return;
  activeAiId = item.dataset.aiId;
  renderAiSummaries();
});

document.getElementById('aiMonthSelect').addEventListener('change', e => {
  activeAiMonth = e.target.value;
  activeAiDate = '';
  activeAiId = '';
  renderAiSummaries();
});

document.getElementById('aiDateSelect').addEventListener('change', e => {
  activeAiDate = e.target.value;
  activeAiId = '';
  renderAiSummaries();
});

loadMarket();
setInterval(loadMarket, 5 * 60 * 1000);
loadAiSummaries();
setInterval(loadAiSummaries, 5 * 60 * 1000);
loadCentralBankSummaries();
setInterval(loadCentralBankSummaries, 10 * 60 * 1000);
</script>
